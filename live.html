<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOTY DOGY PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
  font-size:24px;
  font-weight:bold;
  background:#111827;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#111827;
  border-radius:15px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.name{
  font-size:18px;
  font-weight:bold;
}

.rank{
  font-size:12px;
  opacity:0.7;
}

.row{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.score{
  font-size:22px;
  font-weight:bold;
}

.green{color:#22c55e;}
.red{color:#ef4444;}

.top{
  border:2px solid gold;
}

.bonus{
  margin-top:10px;
  padding:5px;
  border-radius:8px;
  text-align:center;
  font-size:12px;
}

.bonus.ok{background:#16a34a;}
.bonus.no{background:#dc2626;}
</style>

</head>

<body>

<div class="header">🚀 HOTY DOGY PRO DASHBOARD</div>
<div id="app">Loading...</div>

<script>

// 🔥 LINKLAR
const auditURL = "https://docs.google.com/spreadsheets/d/1R78jt3p9K86F49Pn6aurGsWR57hQV5gRuluoUPgP0hw/export?format=csv";
const sbURL    = "https://docs.google.com/spreadsheets/d/1eFhGCDZrCFV72M6w6sM62UJtZOJpn5psTh3b4mNC-fs/export?format=csv";

// 🔥 CSV PARSER
function parseCSV(t){
  return t.split("\n").map(r=>r.split(","));
}

// 🔥 NOMNI TOZALASH
function clean(x){
  return (x || "")
    .toLowerCase()
    .replace(/\s+/g,"")
    .replace("эко","eco")
    .replace("итпарк","itpark")
    .replace("ц1","c1")
    .replace("шевченко","shevchenko")
    .replace("чилонзор","chilonzor")
    .replace("нехт","next")
    .trim();
}

// 🔥 LOAD
Promise.all([
 fetch(auditURL).then(r=>r.text()),
 fetch(sbURL).then(r=>r.text())
])
.then(([a,s])=>{

 let audit = parseCSV(a);
 let sb    = parseCSV(s);

 // 🔥 SB MAP
 let sbMap = {};
 sb.forEach(r=>{
   let name = clean(r[1]);
   let val  = parseFloat(r[2]) || 0;
   if(name) sbMap[name] = val;
 });

 // 🔥 AUDIT LIST
 let list = [];

 for(let i=1;i<=6;i++){

   let name = audit[i][11]; // L ustun
   let avg  = audit[i][12]; // M ustun

   if(!name) continue;

   let key = clean(name);

   list.push({
     name:name,
     avg:parseFloat(avg)||0,
     sb:sbMap[key]||0
   });
 }

 if(list.length===0){
   document.getElementById("app").innerHTML="❌ Ma'lumot yo‘q";
   return;
 }

 // 🔥 SORT
 list.sort((a,b)=>b.avg-a.avg);

 let max = list[0].avg;

 let html = '<div class="container">';

 list.forEach((x,i)=>{

   let color = x.avg < 60 ? "red" : "green";
   let bonus = x.avg >= 60 ? "ok" : "no";
   let top   = x.avg === max ? "top" : "";

   html += `
   <div class="card ${top}">
     <div class="name">${x.name}</div>
     <div class="rank">#${i+1}</div>

     <div class="row">
       <span>Audit</span>
       <span class="score ${color}">
         ${x.avg.toFixed(1)}
       </span>
     </div>

     <div class="row">
       <span>SB Ball</span>
       <span class="score">
         ${x.sb.toFixed(1)}
       </span>
     </div>

     <div class="bonus ${bonus}">
       ${x.avg >= 60 ? "BONUS ✅" : "RED ZONE ❌"}
     </div>
   </div>
   `;
 });

 html += "</div>";

 document.getElementById("app").innerHTML = html;

})
.catch(e=>{
 document.getElementById("app").innerHTML="❌ Xato: "+e;
});

</script>

</body>
</html>
