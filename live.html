<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HOTY DOGY LIVE</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(135deg,#f5e6c8,#fff3d6);
}

.header{
 background:#ff9800;
 color:white;
 text-align:center;
 padding:20px;
 font-size:22px;
 font-weight:bold;
}

.container{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
 gap:20px;
 padding:20px;
}

.card{
 background:white;
 padding:20px;
 border-radius:15px;
 box-shadow:0 10px 25px rgba(0,0,0,0.15);
 transition:0.3s;
}

.card:hover{
 transform:scale(1.05);
}

.top{
 border:3px solid gold;
}

.name{
 font-size:18px;
 font-weight:bold;
 margin-bottom:10px;
}

.rank{
 font-size:12px;
 color:gray;
 margin-bottom:10px;
}

.row{
 display:flex;
 justify-content:space-between;
 margin:8px 0;
}

.score{
 font-size:24px;
 font-weight:bold;
}

.red{color:#e53935;}
.green{color:#2e7d32;}

</style>
</head>

<body>

<div class="header">🌭 HOTY DOGY LIVE DASHBOARD</div>
<div id="app">Loading...</div>

<script>

// 🔥 CSV LINKS
const auditURL = "https://docs.google.com/spreadsheets/d/1R78jt3p9K86F49Pn6aurGsWR57hQV5gRuluoUPgP0hw/export?format=csv";
const sbURL    = "https://docs.google.com/spreadsheets/d/1eFhGCDZrCFV72M6w6sM62UJtZOJpn5psTh3b4mNC-fs/export?format=csv";

// 🔥 CSV parse
function parseCSV(text){
 return text.split("\n").map(r=>r.split(","));
}

// 🔥 nomlarni bir xil qilish
function fix(name){
 let n = name.toLowerCase().trim();

 if(n === "эко") return "eco";
 if(n === "it парк") return "it park";
 if(n === "шевченко") return "shevchenko";
 if(n === "ц1") return "s1";
 if(n === "чилонзор") return "chilonzor";

 return n;
}

Promise.all([
 fetch(auditURL).then(r=>r.text()),
 fetch(sbURL).then(r=>r.text())
])
.then(([auditText, sbText])=>{

 let audit = parseCSV(auditText);
 let sb    = parseCSV(sbText);

 // 🔥 SB MAP
 let sbMap = {};
 for(let i=1;i<sb.length;i++){
   let name = sb[i][1];
   let val  = sb[i][2];

   if(name){
     sbMap[fix(name)] = Number(val||0);
   }
 }

 let list = [];

 // 🔥 AUDIT DATA
 for(let i=1;i<audit.length;i++){

   let name = audit[i][1];

   if(!name) continue;

   let key = fix(name);

   // 🔥 OYLIKNI TOPISH (eng oxirgi son)
   let avg = 0;

   for(let j=0;j<audit[i].length;j++){
     let val = audit[i][j];

     if(val && !isNaN(val)){
       avg = Number(val);
     }
   }

   list.push({
     name:name,
     avg:avg,
     sb:sbMap[key] || 0
   });
 }

 // 🔥 SORT (ranking)
 list.sort((a,b)=>b.avg - a.avg);

 let max = list[0].avg;

 let html = '<div class="container">';

 list.forEach((x,i)=>{

   let color = x.avg < 60 ? "red" : "green";
   let top = x.avg === max ? "top" : "";

   html += `
   <div class="card ${top}">
     <div class="name">${x.name}</div>
     <div class="rank">#${i+1}</div>

     <div class="row">
       <span>Oylik Audit</span>
       <span class="score ${color}">
         ${x.avg.toFixed(1)}
       </span>
     </div>

     <div class="row">
       <span>SB Ball</span>
       <span class="score">
         ${x.sb.toFixed(1)}
       </span>
     </div>
   </div>
   `;
 });

 html += "</div>";

 document.getElementById("app").innerHTML = html;

})
.catch(e=>{
 document.getElementById("app").innerHTML = "❌ Xato: "+e;
});

</script>

</body>
</html>
