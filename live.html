<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HOTY DOGY GALAXY</title>

<style>
body{
 margin:0;
 font-family:Inter,Arial;
 color:#fff;
 background:radial-gradient(circle at 20% 20%,#1b2735,#090a0f);
 overflow-x:hidden;
}

/* ⭐ STAR BACKGROUND */
body::before{
 content:"";
 position:fixed;
 width:100%;
 height:100%;
 background:url("https://www.transparenttextures.com/patterns/stardust.png");
 opacity:0.2;
}

/* HEADER */
.header{
 text-align:center;
 padding:20px;
 font-size:22px;
 font-weight:800;
 letter-spacing:1px;
 background:linear-gradient(90deg,#00c6ff,#0072ff);
 box-shadow:0 0 25px rgba(0,150,255,.5);
}

/* FILTER */
.filter{
 text-align:center;
 margin:15px;
}

select{
 padding:10px;
 border-radius:10px;
 border:none;
 font-size:16px;
}

/* GRID */
.container{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
 gap:20px;
 padding:20px;
}

/* CARD */
.card{
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(10px);
 border-radius:20px;
 padding:20px;
 box-shadow:0 0 20px rgba(0,150,255,0.2);
 transition:.3s;
}

.card:hover{
 transform:scale(1.05);
 box-shadow:0 0 30px rgba(0,200,255,0.5);
}

/* TOP */
.top{
 border:2px solid gold;
 box-shadow:0 0 25px gold;
}

/* TEXT */
.name{font-size:18px;font-weight:700;}
.rank{font-size:12px;color:#aaa;}

.row{
 display:flex;
 justify-content:space-between;
 margin:10px 0;
}

.score{
 font-size:26px;
 font-weight:bold;
}

.red{color:#ff4d4d;}
.yellow{color:#ffc107;}
.green{color:#00ffae;}

/* BONUS */
.status{
 margin-top:10px;
 padding:5px 10px;
 border-radius:10px;
 text-align:center;
 font-size:12px;
}

.bad{background:#ff4d4d33;}
.mid{background:#ffc10733;}
.good{background:#00ffae33;}

.loading{text-align:center;padding:40px;}
</style>
</head>

<body>

<div class="header">🌌 HOTY DOGY GALAXY DASHBOARD</div>

<div class="filter">
<select id="month">
<option>Aprel</option>
<option>Mart</option>
<option>Fevral</option>
</select>
</div>

<div id="app" class="loading">Loading...</div>

<script>

// 🔥 MASTER SHEET (1 ta ishlat)
const url = "https://docs.google.com/spreadsheets/d/1R78jt3p9K86F49Pn6aurGsWR57hQV5gRuluoUPgP0hw/export?format=csv";

// CSV parser
function parseCSV(t){
 return t.split("\n").map(r=>r.split(","));
}

// BONUS STATUS
function getStatus(v){
 if(v >= 80) return ["🟢 SUPER BONUS","good"];
 if(v >= 60) return ["🟡 BONUS","mid"];
 return ["🔴 PROBLEM","bad"];
}

function load(){
 fetch(url)
 .then(r=>r.text())
 .then(text=>{
   let data = parseCSV(text);
   let list=[];

   for(let i=1;i<data.length;i++){
     let name = data[i][1];
     if(!name) continue;

     let val = 0;

     for(let j=0;j<data[i].length;j++){
       let x = data[i][j];
       if(x && !isNaN(x)){
         val = Number(x);
       }
     }

     list.push({name,val,sb:0});
   }

   list.sort((a,b)=>b.val-a.val);
   let max = list[0].val;

   let html='<div class="container">';

   list.forEach((x,i)=>{
     let color = x.val<60?"red":(x.val<80?"yellow":"green");
     let [text,cls]=getStatus(x.val);

     html+=`
     <div class="card ${x.val===max?"top":""}">
       <div class="name">${x.name}</div>
       <div class="rank">#${i+1}</div>

       <div class="row">
         <span>Audit</span>
         <span class="score ${color}">${x.val}</span>
       </div>

       <div class="row">
         <span>SB Ball</span>
         <span class="score">${x.sb}</span>
       </div>

       <div class="status ${cls}">
         ${text}
       </div>
     </div>
     `;
   });

   html+='</div>';
   document.getElementById("app").innerHTML=html;
 })
}

load();

</script>

</body>
</html>
