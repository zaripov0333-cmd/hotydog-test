<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>HOTY DOGY DASHBOARD</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#fff8dc;
}

h1 {
    background:#ff9800;
    color:white;
    padding:20px;
    text-align:center;
}

.container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    background:white;
    width:280px;
    margin:15px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.name {
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.row {
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}

.big {
    font-size:28px;
    font-weight:bold;
}

.green { color:green; }
.red { color:red; }

.back {
    position:absolute;
    top:15px;
    left:15px;
    background:#ff9800;
    color:white;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
}
</style>
</head>

<body>

<a href="dashboard.html" class="back">⬅️</a>

<h1>🌭 HOTY DOGY LIVE</h1>

<div class="container" id="data">Loading...</div>

<script>

// 🔥 2 ta sheet
let auditURL = "https://docs.google.com/spreadsheets/d/1R78jt3p9K86F49Pn6aurGsWR57hQV5gRuluoUPgP0hw/gviz/tq?tqx=out:json";
let sbURL    = "https://docs.google.com/spreadsheets/d/1eFhGCDZrCFV72M6w6sM62UJtZOJpn5psTh3b4mNC-fs/gviz/tq?tqx=out:json";

Promise.all([
    fetch(auditURL).then(r=>r.text()),
    fetch(sbURL).then(r=>r.text())
]).then(([auditData, sbData])=>{

    let auditJson = JSON.parse(auditData.substr(47).slice(0,-2));
    let sbJson    = JSON.parse(sbData.substr(47).slice(0,-2));

    let auditRows = auditJson.table.rows;
    let sbRows    = sbJson.table.rows;

    let names = ["Shevchenko","Chilonzor","Hext","Eco","S1","IT Park"];

    let html = "";

    for(let i=1;i<=6;i++){

        // 🔥 AUDIT (sening rasmga mos)
        let audit = auditRows[i]?.c[2]?.v || 0;

        // 🔥 SB (2-qatorlardan boshlanadi)
        let sb = sbRows[i]?.c[2]?.v || 0;

        let color = audit >= 60 ? "green" : "red";

        html += `
        <div class="card">
            <div class="name">${names[i-1]}</div>

            <div class="row">
                <span>Audit</span>
                <span class="big ${color}">${audit}</span>
            </div>

            <div class="row">
                <span>SB Ball</span>
                <span class="big">${sb}</span>
            </div>
        </div>
        `;
    }

    document.getElementById("data").innerHTML = html;

});
</script>

</body>
</html>
