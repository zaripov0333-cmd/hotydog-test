<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>HOTY DOGY LIVE</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#f5e6c8,#fff3d6);
}

h1{
    background:#ff9800;
    color:white;
    padding:20px;
    text-align:center;
    margin:0;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.card{
    width:260px;
    margin:15px;
    padding:20px;
    border-radius:18px;
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.06);
}

.name{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.row{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

.score{
    font-size:26px;
    font-weight:bold;
}

.red{color:#e53935;}
.green{color:#2e7d32;}

.top{
    border:3px solid gold;
    background:#fffdf5;
}

.rank{
    font-size:14px;
    color:#999;
}

</style>
</head>

<body>

<h1>🌭 HOTY DOGY LIVE DASHBOARD</h1>

<div class="container" id="data">Loading...</div>

<script>

// 🔥 2 ta sheet
let auditURL = "https://docs.google.com/spreadsheets/d/1R78jt3p9K86F49Pn6aurGsWR57hQV5gRuluoUPgP0hw/gviz/tq?sheet=5%20%D1%84%D0%B8%D0%BB%D0%B8%D0%B0%D0%BB%20(aprel)&tqx=out:json";

let sbURL = "https://docs.google.com/spreadsheets/d/1eFhGCDZrCFV72M6w6sM62UJtZOJpn5psTh3b4mNC-fs/gviz/tq?sheet=5%20%D1%84%D0%B8%D0%BB%D0%B8%D0%B0%D0%BB%20(aprel)&tqx=out:json";

Promise.all([
    fetch(auditURL).then(r=>r.text()),
    fetch(sbURL).then(r=>r.text())
]).then(([auditData, sbData])=>{

    let auditJson = JSON.parse(auditData.substr(47).slice(0,-2));
    let sbJson    = JSON.parse(sbData.substr(47).slice(0,-2));

    let auditRows = auditJson.table.rows;
    let sbRows    = sbJson.table.rows;

    // 🔥 SB map (nomga bog‘lash)
    let sbMap = {};
    for(let i=1;i<sbRows.length;i++){
        let name = sbRows[i]?.c[1]?.v;
        let val  = sbRows[i]?.c[2]?.v;

        if(name){
            sbMap[name.toLowerCase()] = Number(val);
        }
    }

    let list = [];

    for(let i=1;i<auditRows.length;i++){

        let name = auditRows[i]?.c[1]?.v;
        let audit = auditRows[i]?.c[2]?.v;

        if(!name) continue;

        let key = name.toLowerCase();

        // 🔥 faqat filiallar
        let allowed = ["шевченко","чилонзор","hext","eco","ц1","it park"];
        if(!allowed.includes(key)) continue;

        list.push({
            name:name,
            audit:Number(audit),
            sb:sbMap[key] || 0
        });
    }

    // 🔥 SORT (ranking)
    list.sort((a,b)=>b.audit - a.audit);

    let max = list[0].audit;

    let html = "";

    list.forEach((item,index)=>{

        let color = item.audit < 60 ? "red" : "green";
        let top   = item.audit === max ? "top" : "";

        html += `
        <div class="card ${top}">
            
            <div class="name">${item.name}</div>
            <div class="rank">#${index+1} filial</div>

            <div class="row">
                <span>Audit</span>
                <span class="score ${color}">
                    ${item.audit.toFixed(1)}
                </span>
            </div>

            <div class="row">
                <span>SB Ball</span>
                <span class="score">
                    ${item.sb.toFixed(1)}
                </span>
            </div>

        </div>
        `;
    });

    document.getElementById("data").innerHTML = html;

});
</script>

</body>
</html>
