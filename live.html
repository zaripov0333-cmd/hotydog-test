<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>HOTY DOGY DASHBOARD</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#fff8dc;
}

h1 {
    background:#ff9800;
    color:white;
    padding:20px;
    text-align:center;
}

.container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    background:white;
    width:280px;
    margin:15px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.name {
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.row {
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}

.big {
    font-size:28px;
    font-weight:bold;
}

.green { color:green; }
.red { color:red; }

.back {
    position:absolute;
    top:15px;
    left:15px;
    background:#ff9800;
    color:white;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
}
</style>
</head>

<body>

<a href="dashboard.html" class="back">⬅️</a>

<h1>🌭 HOTY DOGY LIVE</h1>

<div class="container" id="data">Loading...</div>
<script>

let auditURL = "https://docs.google.com/spreadsheets/d/1R78jt3p9K86F49Pn6aurGsWR57hQV5gRuluoUPgP0hw/gviz/tq?sheet=Об&tqx=out:json";

let sbURL = "https://docs.google.com/spreadsheets/d/1eFhGCDZrCFV72M6w6sM62UJtZOJpn5psTh3b4mNC-fs/gviz/tq?sheet=5%20%D1%84%D0%B8%D0%BB%D0%B8%D0%B0%D0%BB%20(aprel)&tqx=out:json";

Promise.all([
    fetch(auditURL).then(r=>r.text()),
    fetch(sbURL).then(r=>r.text())
]).then(([auditData, sbData])=>{

    let auditJson = JSON.parse(auditData.substr(47).slice(0,-2));
    let sbJson    = JSON.parse(sbData.substr(47).slice(0,-2));

    let auditRows = auditJson.table.rows;
    let sbRows    = sbJson.table.rows;

    // 🔥 SB MAP
    let sbMap = {};
    for(let i=1;i<sbRows.length;i++){
        let name = sbRows[i]?.c[1]?.v;
        let val  = sbRows[i]?.c[2]?.v;

        if(name){
            sbMap[name.toLowerCase()] = val;
        }
    }

    let html = "";

    for(let i=1;i<auditRows.length;i++){

        let name  = auditRows[i]?.c[1]?.v;
        let audit = auditRows[i]?.c[2]?.v || 0;

        let sb = sbMap[name?.toLowerCase()] || 0;

        // 🔥 FLOAT FIX
        audit = Number(audit).toFixed(1);
        sb    = Number(sb).toFixed(1);

        let color = audit < 60 ? "red" : "green";

        html += `
        <div style="
            background:white;
            margin:15px;
            padding:15px;
            width:260px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        ">
            <h3>${name}</h3>

            <p>Audit: 
                <span style="color:${color};font-size:24px;font-weight:bold;">
                    ${audit}
                </span>
            </p>

            <p>SB Ball: 
                <span style="font-size:20px;font-weight:bold;">
                    ${sb}
                </span>
            </p>
        </div>
        `;
    }

    document.getElementById("data").innerHTML = html;

});
</script>

</body>
</html>
