<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Live Audit</title>

<style>
body { font-family:sans-serif; background:#fff8dc; text-align:center; }

h1 {
    background:#ff9800;
    color:white;
    padding:20px;
}

.back {
    position:absolute;
    top:15px;
    left:15px;
    background:#ff9800;
    color:white;
    padding:8px;
    border-radius:8px;
    text-decoration:none;
}

.card {
    background:white;
    margin:15px auto;
    padding:15px;
    width:300px;
    border-radius:12px;
}

.green { color:green; }
.red { color:red; }
</style>
</head>

<body>

<a href="dashboard.html" class="back">⬅️</a>

<h1>🔥 LIVE AUDIT</h1>

<div id="data">Yuklanmoqda...</div>

<script>
fetch("https://docs.google.com/spreadsheets/d/1R78jt3p9K86F49Pn6aurGsWR57hQV5gRuluoUPgP0hw/gviz/tq?tqx=out:json")
.then(res => res.text())
.then(data => {

    let json = JSON.parse(data.substr(47).slice(0,-2));
    let rows = json.table.rows;

    let names = ["Chilonzor","Eco","Hext","Shevchenko","S1","IT Park"];
    let html = "";

    for(let i=0;i<6;i++){

        let a1 = rows[i]?.c[2]?.v || 0;
        let a2 = rows[i]?.c[6]?.v || 0;
        let m  = rows[i]?.c[12]?.v || 0;

        let color = m >= 50 ? "green" : "red";

        html += `
        <div class="card">
            <h2>${names[i]}</h2>
            <p>1-audit: ${a1}</p>
            <p>2-audit: ${a2}</p>
            <p class="${color}" style="font-size:25px;">Oylik: ${m}</p>
        </div>
        `;
    }

    document.getElementById("data").innerHTML = html;

});
</script>

</body>
</html>
