<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HOTY DOGY PRO</title>

<style>
body{
 margin:0;
 font-family:Segoe UI;
 background:#0b0f1a;
 color:white;
}

/* HEADER */
.header{
 text-align:center;
 padding:25px;
 font-size:26px;
 font-weight:700;
 background:linear-gradient(90deg,#1f2937,#0f172a);
}

/* GRID */
.container{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
 gap:20px;
 padding:25px;
}

/* CARD */
.card{
 background:linear-gradient(145deg,#111827,#1f2937);
 border-radius:16px;
 padding:20px;
 box-shadow:0 10px 25px rgba(0,0,0,0.5);
 transition:0.3s;
}

.card:hover{
 transform:translateY(-5px) scale(1.02);
}

.name{
 font-size:18px;
 font-weight:700;
 margin-bottom:10px;
}

.row{
 display:flex;
 justify-content:space-between;
 margin:10px 0;
}

.score{
 font-size:24px;
 font-weight:800;
}

.red{color:#ef4444;}
.green{color:#22c55e;}

.top{
 border:2px solid gold;
}

.rank{
 font-size:12px;
 opacity:0.6;
}

</style>
</head>

<body>

<div class="header">🚀 HOTY DOGY PRO DASHBOARD</div>
<div id="app">Loading...</div>

<script>

const auditURL = "https://docs.google.com/spreadsheets/d/1R78jt3p9K86F49Pn6aurGsWR57hQV5gRuluoUPgP0hw/export?format=csv";
const sbURL    = "https://docs.google.com/spreadsheets/d/1eFhGCDZrCFV72M6w6sM62UJtZOJpn5psTh3b4mNC-fs/export?format=csv";

function parseCSV(t){
  return t.split("\n").map(r=>r.split(","));
}

function clean(x){
  return (x || "").toLowerCase().replace(/\s+/g,"").trim();
}

Promise.all([
 fetch(auditURL).then(r=>r.text()),
 fetch(sbURL).then(r=>r.text())
])
.then(([a,s])=>{

 let audit = parseCSV(a);
 let sb    = parseCSV(s);

 // SB MAP
 let sbMap = {};
 sb.forEach(r=>{
   let name = clean(r[1]);
   let val  = Number(r[2] || 0);
   if(name) sbMap[name] = val;
 });

 let list = [];

 // 🔥 "1 мс" BLOKNI TOPAMIZ
 let startRow = -1;
 let startCol = -1;

 audit.forEach((row, r)=>{
   row.forEach((cell, c)=>{
     if(clean(cell).includes("1мс")){
       startRow = r + 1; // pastdan boshlaymiz
       startCol = c;
     }
   });
 });

 if(startRow === -1){
   document.getElementById("app").innerHTML = "❌ 1 мс topilmadi";
   return;
 }

 // 🔥 6 TA FILIALNI OLAMIZ
 for(let i=0;i<6;i++){

   let name = audit[startRow + i][startCol];
   let avg  = audit[startRow + i][startCol + 1];

   if(!name) continue;

   let key = clean(name);

   list.push({
     name: name,
     avg: Number(avg || 0),
     sb: sbMap[key] || 0
   });
 }

 if(list.length === 0){
   document.getElementById("app").innerHTML = "❌ Ma'lumot yo‘q";
   return;
 }

 // SORT
 list.sort((a,b)=>b.avg - a.avg);

 let max = list[0].avg;

 let html = '<div class="container">';

 list.forEach((x,i)=>{

   let color = x.avg < 60 ? "red" : "green";
   let top = x.avg === max ? "top" : "";

   html += `
   <div class="card ${top}">
     <div class="name">${x.name}</div>
     <div class="rank">#${i+1}</div>

     <div class="row">
       <span>Oylik Audit</span>
       <span class="score ${color}">
         ${x.avg.toFixed(1)}
       </span>
     </div>

     <div class="row">
       <span>SB Ball</span>
       <span class="score">
         ${x.sb.toFixed(1)}
       </span>
     </div>
   </div>
   `;
 });

 html += "</div>";

 document.getElementById("app").innerHTML = html;

})
.catch(e=>{
 document.getElementById("app").innerHTML = "❌ Xato: " + e;
});

</script>
 

</body>
</html>
