<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HOTY DOGY LIVE</title>

<style>
:root{
  --bg1:#f6e7c9;
  --bg2:#fff5db;
  --primary:#ff9800;
  --green:#2e7d32;
  --red:#e53935;
  --card:#ffffff;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter, system-ui, Arial;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
}
.header{
  background:var(--primary);
  color:#fff;
  padding:18px 16px;
  text-align:center;
  font-weight:800;
  letter-spacing:.5px;
}
.container{
  max-width:1200px;
  margin:0 auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
}
.card{
  background:var(--card);
  border-radius:18px;
  padding:18px;
  box-shadow:0 12px 30px rgba(0,0,0,.12);
  transition:.25s;
}
.card:hover{ transform:translateY(-4px) scale(1.02); }
.name{
  font-size:18px;
  font-weight:700;
  margin-bottom:8px;
}
.rank{
  font-size:12px;
  color:#888;
  margin-bottom:10px;
}
.row{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  align-items:center;
}
.label{color:#666}
.score{
  font-size:26px;
  font-weight:800;
}
.red{color:var(--red)}
.green{color:var(--green)}
.top{
  border:2px solid gold;
  background:#fffdf4;
}
.loading{
  text-align:center;
  padding:40px;
  color:#555;
}
.error{
  color:red;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<div class="header">🌭 HOTY DOGY LIVE DASHBOARD</div>
<div id="app" class="loading">Yuklanmoqda...</div>

<script>

// 🔥 SHEET LINKLAR (CSV)
const auditURL = "https://docs.google.com/spreadsheets/d/1R78jt3p9K86F49Pn6aurGsWR57hQV5gRuluoUPgP0hw/export?format=csv";
const sbURL    = "https://docs.google.com/spreadsheets/d/1eFhGCDZrCFV72M6w6sM62UJtZOJpn5psTh3b4mNC-fs/export?format=csv";

// 🔥 parse
function parseCSV(text){
 return text.split("\n").map(r=>r.split(","));
}

// 🔥 nomni bir xil qilish
function fix(name){
 let n = name.toLowerCase().trim();

 if(n === "эко") return "eco";
 if(n === "it парк") return "it park";
 if(n === "шевченко") return "шевченко";
 if(n === "ц1") return "ц1";

 return n;
}

Promise.all([
 fetch(auditURL).then(r=>r.text()),
 fetch(sbURL).then(r=>r.text())
])
.then(([auditText, sbText])=>{

 let audit = parseCSV(auditText);
 let sb    = parseCSV(sbText);

 // 🔥 SB MAP
 let sbMap = {};
 for(let i=1;i<sb.length;i++){
   let name = sb[i][1];
   let val  = sb[i][2];

   if(name){
     sbMap[fix(name)] = Number(val||0);
   }
 }

 let list = [];

 // 🔥 AUDIT (O‘NG BLOK — OYLIK)
 for(let i=1;i<=6;i++){

   let name = audit[i][1]; // B ustun
   let avg  = audit[i][12]; // M ustun (oylik)

   if(!name) continue;

   let key = fix(name);

   list.push({
     name:name,
     avg:Number(avg||0),
     sb:sbMap[key] || 0
   });
 }

 // 🔥 sort
 list.sort((a,b)=>b.avg-a.avg);

 let max = list[0].avg;

 let html = '<div class="container">';

 list.forEach((x,i)=>{

   let color = x.avg < 60 ? "red" : "green";
   let top = x.avg === max ? "top" : "";

   html += `
   <div class="card ${top}">
     <div class="name">${x.name}</div>
     <div class="rank">#${i+1}</div>

     <div class="row">
       <span>Oylik Audit</span>
       <span class="score ${color}">
         ${x.avg.toFixed(1)}
       </span>
     </div>

     <div class="row">
       <span>SB Ball</span>
       <span class="score">
         ${x.sb.toFixed(1)}
       </span>
     </div>
   </div>
   `;
 });

 html += "</div>";

 document.getElementById("app").innerHTML = html;

})
.catch(e=>{
 document.getElementById("app").innerHTML = "❌ Xato: "+e;
});

</script>

</body>
</html>
