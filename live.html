<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HOTY DOGY LIVE</title>

<style>
:root{
  --bg1:#f6e7c9;
  --bg2:#fff5db;
  --primary:#ff9800;
  --green:#2e7d32;
  --red:#e53935;
  --card:#ffffff;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter, system-ui, Arial;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
}
.header{
  background:var(--primary);
  color:#fff;
  padding:18px 16px;
  text-align:center;
  font-weight:800;
  letter-spacing:.5px;
}
.container{
  max-width:1200px;
  margin:0 auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
}
.card{
  background:var(--card);
  border-radius:18px;
  padding:18px;
  box-shadow:0 12px 30px rgba(0,0,0,.12);
  transition:.25s;
}
.card:hover{ transform:translateY(-4px) scale(1.02); }
.name{
  font-size:18px;
  font-weight:700;
  margin-bottom:8px;
}
.rank{
  font-size:12px;
  color:#888;
  margin-bottom:10px;
}
.row{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  align-items:center;
}
.label{color:#666}
.score{
  font-size:26px;
  font-weight:800;
}
.red{color:var(--red)}
.green{color:var(--green)}
.top{
  border:2px solid gold;
  background:#fffdf4;
}
.loading{
  text-align:center;
  padding:40px;
  color:#555;
}
.error{
  color:red;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<div class="header">🌭 HOTY DOGY LIVE DASHBOARD</div>
<div id="app" class="loading">Yuklanmoqda...</div>

<script>
// ❗ SHEET ID LAR
const AUDIT_ID = "1R78jt3p9K86F49Pn6aurGsWR57hQV5gRuluoUPgP0hw";
const SB_ID    = "1eFhGCDZrCFV72M6w6sM62UJtZOJpn5psTh3b4mNC-fs";

// ❗ bu list nomi qanaqa bo‘lsa ham ishlaydi
const AUDIT_URL = `https://docs.google.com/spreadsheets/d/${AUDIT_ID}/gviz/tq?tqx=out:json`;
const SB_URL    = `https://docs.google.com/spreadsheets/d/${SB_ID}/gviz/tq?tqx=out:json`;

// ❗ faqat shu filiallar chiqadi
const ALLOWED = ["шевченко","чилонзор","hext","eco","ц1","it park"];

function parseGViz(txt){
  return JSON.parse(txt.substr(47).slice(0,-2));
}

function norm(s){
  return String(s||"").toLowerCase().trim();
}

async function load(){
  try{
    const [aTxt, sTxt] = await Promise.all([
      fetch(AUDIT_URL).then(r=>r.text()),
      fetch(SB_URL).then(r=>r.text())
    ]);

    const aJson = parseGViz(aTxt);
    const sJson = parseGViz(sTxt);

    const aRows = aJson.table.rows;
    const sRows = sJson.table.rows;

    // 🔥 SB MAP (nom → qiymat)
    const sbMap = {};
    for(let i=1;i<sRows.length;i++){
      const name = sRows[i]?.c?.[1]?.v;
      const val  = sRows[i]?.c?.[2]?.v;
      if(name){
        sbMap[norm(name)] = Number(val||0);
      }
    }

    // 🔥 AUDIT LIST
    const list = [];
    for(let i=1;i<aRows.length;i++){
      const name = aRows[i]?.c?.[1]?.v;
      const val  = aRows[i]?.c?.[2]?.v;

      if(!name) continue;

      const key = norm(name);
      if(!ALLOWED.includes(key)) continue;

      list.push({
        name,
        audit: Number(val||0),
        sb: sbMap[key] || 0
      });
    }

    // 🔥 SORT (ranking)
    list.sort((a,b)=>b.audit - a.audit);

    const max = list.length ? list[0].audit : 0;

    // 🔥 RENDER
    const html = `
      <div class="container">
        ${list.map((x,i)=>{
          const color = x.audit < 60 ? "red" : "green";
          const top   = x.audit === max ? "top" : "";
          return `
            <div class="card ${top}">
              <div class="name">${x.name}</div>
              <div class="rank">#${i+1}</div>

              <div class="row">
                <div class="label">Audit</div>
                <div class="score ${color}">${x.audit.toFixed(1)}</div>
              </div>

              <div class="row">
                <div class="label">SB Ball</div>
                <div class="score">${x.sb.toFixed(1)}</div>
              </div>
            </div>
          `;
        }).join("")}
      </div>
    `;

    document.getElementById("app").innerHTML = html;

  }catch(e){
    document.getElementById("app").innerHTML =
      `<div class="error">❌ Xatolik: ${e.message}</div>`;
    console.error(e);
  }
}

load();
</script>

</body>
</html>
