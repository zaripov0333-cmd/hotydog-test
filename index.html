<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Hoty Dogy Login</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background: linear-gradient(135deg,#FFD700,#FFA500);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:300px;
}

h1 { color:#ff9800; }

input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:10px;
    border:none;
    background:#ff9800;
    color:white;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
    <h1>🌭 HOTY DOGY</h1>

    <input type="text" id="login" placeholder="Login">
    <input type="password" id="password" placeholder="Parol">

    <button onclick="checkLogin()">Kirish</button>
</div>

<script>
function checkLogin(){
    let login = document.getElementById("login").value;
    let password = document.getElementById("password").value;

    if(login === "admin" && password === "1234"){
        window.location.href = "dashboard.html";
    } else {
        alert("Login yoki parol xato!");
    }
}
</script>

</body>
</html>
