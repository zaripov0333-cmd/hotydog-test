<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Kirish</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    background: linear-gradient(135deg, #ffcc00, #ff9900);
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease;
}

h2 {
    color: #ff9900;
}

input {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #ffcc00, #ff9900);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

#error {
    color: red;
    display: none;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="login-box">
    <h2>🔐 Kirish</h2>
    <input type="password" id="pass" placeholder="Parol">
    <button onclick="login()">Kirish</button>
    <p id="error">❌ Parol xato!</p>
</div>

<script>
function login() {
    const pass = document.getElementById('pass').value;

    if (pass === "12345") {
        sessionStorage.setItem('auth', 'true');
        window.location.href = "dashboard.html";
    } else {
        document.getElementById('error').style.display = 'block';
    }
}
</script>

</body>
</html>
