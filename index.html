<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Katalog | Hoty Dogy</title>
  <style>
    body { background:#0a0a0a; color:#fff; font-family:Poppins,sans-serif; padding:20px; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th,td { border-bottom:1px solid #333; padding:10px; }
    th { background:#FFD43B; color:#000; }
    .btn { background:#FFD43B; border:0; padding:10px; font-weight:bold; cursor:pointer; }
  </style>
</head>
<body>

  <h1>Katalog</h1>
  <button class="btn" onclick="loadData()">Yangilash</button>
  <table id="catalogTable">
    <thead><tr><th>Nomi</th><th>Narxi</th><th>Toifa</th></tr></thead>
    <tbody></tbody>
  </table>

<script>
  const SHEET_ID = 'YOUR_GOOGLE_SHEET_ID'; // Google Sheets ID
  const API_KEY = 'YOUR_API_KEY'; // Sheets API key
  const RANGE = 'Katalog!A2:C'; // Nom, Narx, Toifa ustunlari

  async function loadData() {
      const url = `[sheets.googleapis.com](https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY})`;
      const res = await fetch(url);
      const data = await res.json();
      const rows = data.values || [];
      const tbody = document.querySelector("#catalogTable tbody");
      tbody.innerHTML = rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('');
  }

  loadData(); // sahifa ochilganda avtomatik yuklansin
</script>

</body>
</html>
