<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Kirish | Audit System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-96 text-center">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Tizimga kirish</h2>
        <input type="text" id="user" placeholder="Login" class="w-full p-3 mb-4 border rounded-lg focus:outline-blue-500">
        <input type="password" id="pass" placeholder="Parol" class="w-full p-3 mb-6 border rounded-lg focus:outline-blue-500">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition">Kirish</button>
        <p id="error" class="text-red-500 mt-4 hidden">Login yoki parol xato!</p>
    </div>

    <script>
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === 'admin' && p === 'admin123') {
                window.location.href = 'admin.html';
            } else if(u === 'viewer' && p === 'view123') {
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
