<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background: linear-gradient(135deg,#FFD700,#FFA500);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box {
    background:white;
    padding:30px;
    border-radius:15px;
    width:300px;
    text-align:center;
}
input, button {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}
button {
    background:#ff9800;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="box">
<h2>🌭 HOTY DOGY</h2>

<input id="login" placeholder="Login">
<input id="parol" type="password" placeholder="Parol">

<button onclick="kirish()">Kirish</button>
</div>

<script>
function kirish(){
    if(login.value=="admin" && parol.value=="1234"){
        location="dashboard.html";
    } else {
        alert("Xato!");
    }
}
</script>

</body>
</html>
