<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Kirish</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #error { color: red; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Tizimga kirish</h2>
        <input type="password" id="pass" placeholder="Parolni kiriting">
        <button onclick="login()">Kirish</button>
        <p id="error">Parol xato!</p>
    </div>

    <script>
        function login() {
            const pass = document.getElementById('pass').value;
            if (pass === "12345") { // PAROL SHU YERDA
                sessionStorage.setItem('auth', 'true');
                window.location.href = "dashboard.html";
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
    </script>
</body>
</html>
