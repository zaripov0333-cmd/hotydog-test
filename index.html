<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;background:#0f172a;color:white;font-family:sans-serif}
.box{background:#111827;padding:30px;border-radius:12px;width:250px}
input,button{width:100%;margin:8px 0;padding:10px}
</style>
</head>
<body>

<div class="box">
<h2>HOTY DOGY</h2>
<input id="l" placeholder="login">
<input id="p" type="password" placeholder="password">
<button onclick="go()">Kirish</button>
</div>

<script>
function go(){
 let l=document.getElementById("l").value;
 let p=document.getElementById("p").value;

 if(l=="admin" && p=="1234"){
   localStorage.role="admin";
   location="admin.html";
 }
 else if(l=="user" && p=="1234"){
   localStorage.role="user";
   location="live.html";
 }
 else alert("Xato");
}
</script>

</body>
</html>
