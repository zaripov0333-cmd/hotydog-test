<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hoty Dogy | Katalog & Audit</title>
  <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap)" rel="stylesheet">
  <style>
    :root {
      --primary: #FFD43B;
      --dark: #0a0a0a;
      --card-bg: rgba(255,255,255,0.05);
      --glass: rgba(255,255,255,0.1);
      --success: #2ecc71;
      --danger: #e74c3c;
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{background:var(--dark);color:#fff;min-height:100vh;background-image:radial-gradient(circle at top right,#1a1a1a,#0a0a0a);}
    .header{background:rgba(0,0,0,0.8);backdrop-filter:blur(15px);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--glass);position:sticky;top:0;z-index:1000;}
    .header h1{font-size:16px;color:var(--primary);text-transform:uppercase;letter-spacing:2px;}
    .container{padding:15px;max-width:600px;margin:auto;}
    .login-box{background:var(--card-bg);padding:40px;border-radius:30px;border:1px solid var(--glass);width:100%;text-align:center;backdrop-filter:blur(10px);}
    input{width:100%;padding:14px;margin:10px 0;border-radius:12px;border:1px solid var(--glass);background:rgba(255,255,255,0.05);color:#fff;outline:none;}
    .btn{background:var(--primary);color:#000;padding:15px;border-radius:12px;border:none;font-weight:800;width:100%;cursor:pointer;transition:0.2s;}
    .btn:active{transform:scale(0.95);}
    .btn-outline{background:transparent;color:var(--primary);border:1px solid var(--primary);}
    .menu-btns{display:flex;gap:15px;margin-top:15px;}
    .card{background:var(--card-bg);border:1px solid var(--glass);border-radius:15px;padding:20px;margin-bottom:20px;}
    table{width:100%;border-collapse:collapse;margin-top:10px;}
    th,td{border-bottom:1px solid var(--glass);padding:8px;}
    th{background:var(--primary);color:#000;}
    .choice{flex:1;padding:12px;border-radius:10px;border:1px solid var(--glass);background:transparent;color:#fff;cursor:pointer;font-weight:bold;}
    .choice.active-good{background:var(--success);border:none;}
    .choice.active-bad{background:var(--danger);border:none;}
    .btn-group{display:flex;gap:10px;margin:10px 0;}
    img{width:100%;border-radius:15px;margin-top:10px;border:1px solid var(--glass);}
  </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" style="display:flex;align-items:center;justify-content:center;height:100vh;">
  <div class="login-box">
    <h2 style="color:var(--primary);margin-bottom:20px;font-weight:800;">HOTY DOGY</h2>
    <input type="text" id="login" placeholder="Login">
    <input type="password" id="password" placeholder="Parol">
    <button class="btn" onclick="login()">Tizimga kirish</button>
  </div>
</div>

<!-- APP MAIN -->
<div id="app" style="display:none;">
  <div class="header">
    <h1>Hoty Dogy Tizimi</h1>
    <div style="cursor:pointer;color:var(--danger);font-weight:bold;font-size:12px;" onclick="logout()">CHIQISH</div>
  </div>
  <div class="container">
    <div id="homeView">
      <h3>Xush kelibsiz, <span style="color:var(--primary);" id="username">Hoty</span></h3>
      <div class="menu-btns">
        <button class="btn" onclick="showView('catalogView')">📂 Katalog</button>
        <button class="btn btn-outline" onclick="showView('auditView')">🧾 Audit</button>
      </div>
    </div>

    <!-- KATALOG VIEW -->
    <div id="catalogView" style="display:none;">
      <div style="margin-bottom:15px;cursor:pointer;color:var(--primary);" onclick="showView('homeView')">← ORQAGA</div>
      <h3>Katalog (Google Sheets bilan bog‘liq)</h3>
      <button class="btn" style="margin-top:10px" onclick="loadCatalog()">Yangilash</button>
      <div id="sheetStatus" style="opacity:.7;font-size:13px;margin-top:8px;"></div>
      <table id="catalogTable">
        <thead><tr><th>Nomi</th><th>Narxi</th><th>Toifa</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- AUDIT VIEW -->
    <div id="auditView" style="display:none;">
      <div style="margin-bottom:15px;cursor:pointer;color:var(--primary);" onclick="showView('homeView')">← ORQAGA</div>
      <div class="card">
        <h3 style="margin-bottom:10px;color:var(--primary)">Audit Tizimi</h3>
        <select id="auditBranch" style="padding:10px;width:100%;border-radius:10px;">
          <option>Ц1</option><option>Shevchenko</option><option>Chilonzor</option>
          <option>Next</option><option>Eko</option><option>IT Park</option>
        </select>
        <div id="questionsContainer"></div>
        <button class="btn" style="height:70px;font-size:18px;margin-top:20px;" onclick="submitAudit()">AUDITNI SAQLASH</button>
      </div>
      <h4>Saqlangan auditlar</h4>
      <div id="auditHistory"></div>
    </div>
  </div>
</div>

<script>
/* LOGIN */
function login(){
  const l=document.getElementById('login').value.trim();
  const p=document.getElementById('password').value.trim();
  if(l==="Hoty" && p==="123456"){
     document.getElementById('loginPage').style.display='none';
     document.getElementById('app').style.display='block';
     showView('homeView');
  } else {
     alert("Login yoki parol xato!");
  }
}
function logout(){location.reload();}

/* VIEW TOGGLE */
function showView(id){
  ['homeView','catalogView','auditView'].forEach(v=>{
    document.getElementById(v).style.display=(v===id)?'block':'none';
  });
  if(id==='auditView') setupAudit();
}

/* --- GOOGLE SHEETS DATA --- */
const SHEET_ID='YOUR_SHEET_ID';
const API_KEY='YOUR_API_KEY';
const RANGE='Katalog!A2:C';
async function loadCatalog(){
  const el=document.getElementById('sheetStatus');
  try{
    el.innerText='Yuklanmoqda...';
    const url=`[sheets.googleapis.com](https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY})`;
    const res=await fetch(url);
    const data=await res.json();
    const rows=data.values||[];
    const tbody=document.querySelector("#catalogTable tbody");
    tbody.innerHTML=rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('');
    el.innerText='Ma’lumotlar yuklandi ✅';
  }catch(e){
    el.innerText='Xatolik: Google Sheets bilan bog‘lanmadi ❌';
  }
}

/* --- AUDIT TIZIMI --- */
const QUESTIONS=[
  {text:"Restoran oldidagi bruschatka butun, mustahkam va toza.",minus:1},
  {text:"XotyDogy yorlig'i toza va soz.",minus:1},
  {text:"Chiqindi baklari toza va 3/4 dan oshmagan.",minus:1},
  {text:"Zina va pandus toza va shikastlanmagan.",minus:1},
  {text:"Barcha yoritish vositalari ishlaydi.",minus:1},
  {text:"Pollar toza.",minus:1},
  {text:"TV ishlaydi.",minus:1},
  {text:"Mahsulot sifati yaxshi.",minus:5},
  {text:"Yaroqlilik muddati o‘tmagan.",minus:20}
];
let currentMarks={};
function setupAudit(){
  currentMarks={};
  const c=document.getElementById('questionsContainer');
  c.innerHTML=QUESTIONS.map((q,i)=>`
    <div style="margin-top:10px;padding-bottom:5px;border-bottom:1px solid var(--glass)">
      <p><b>${i+1}. </b>${q.text}</p>
      <div class="btn-group">
        <button id="g_${i}" class="choice" onclick="setMark(${i},'good')">YAXSHI</button>
        <button id="b_${i}" class="choice" onclick="setMark(${i},'bad')">YOMON</button>
      </div>
    </div>`).join('');
  renderAuditHistory();
}
function setMark(i,s){
  currentMarks[i]=s;
  document.getElementById("g_"+i).className="choice "+(s==='good'?'active-good':'');
  document.getElementById("b_"+i).className="choice "+(s==='bad'?'active-bad':'');
}
function submitAudit(){
  if(Object.keys(currentMarks).length<QUESTIONS.length){alert("Barcha savollarni belgilang!");return;}
  let score=100;
  QUESTIONS.forEach((q,i)=>{if(currentMarks[i]==='bad')score-=q.minus;});
  score=Math.max(0,score);
  const branch=document.getElementById('auditBranch').value;
  const audits=JSON.parse(localStorage.getItem('AUDITS')||'[]');
  audits.push({branch,score,date:new Date().toLocaleString()});
  localStorage.setItem('AUDITS',JSON.stringify(audits));
  alert("Audit saqlandi! Ball: "+score);
  renderAuditHistory();
}
function renderAuditHistory(){
  const h=document.getElementById('auditHistory');
  const audits=JSON.parse(localStorage.getItem('AUDITS')||'[]');
  h.innerHTML=audits.map(a=>`
    <div class="card">
      <div style="display:flex;justify-content:space-between;"><b>${a.branch}</b><span>${a.score} ball</span></div>
      <small style="opacity:.7">${a.date}</small>
    </div>`).join('');
}
</script>
</body>
</html>
