<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .btn { display: block; text-decoration: none; padding: 20px; margin: 10px 0; border-radius: 8px; color: white; font-weight: bold; font-size: 18px; }
        .audit { background: #17a2b8; }
        .sb-ball { background: #28a745; }
        .logout { background: #dc3545; padding: 10px; margin-top: 20px; display: inline-block; text-decoration: none; border-radius: 5px; color: white; font-size: 14px;}
    </style>
    <script>
        // Agar login qilmasdan kirmoqchi bo'lsa, orqaga haydab yuboradi
        if (sessionStorage.getItem('auth') !== 'true') {
            window.location.href = "index.html";
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>Asosiy bo'limlar</h2>
        
        <a href="https://docs.google.com/spreadsheets/d/1R78jt3p9K86F49Pn6aurGsWR57hQV5gRuluoUPgP0hw/edit?usp=sharing" 
           target="_blank" class="btn audit">📊 Audit</a>

        <a href="https://docs.google.com/spreadsheets/d/1eFhGCDZrCFV72M6w6sM62UJtZOJpn5psTh3b4mNC-fs/edit?usp=sharing" 
           target="_blank" class="btn sb-ball">📈 SB ball</a>

        <a href="#" onclick="sessionStorage.clear(); window.location.href='index.html';" class="logout">Chiqish</a>
    </div>
</body>
</html>
