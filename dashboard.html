}

width:100%;padding:10px;

img{
width:100%;
max-height:280px;

margin-top:8px;
cursor:pointer;
border: 2px solid #eee;
}
.good{background:green!important; color: white !important;}
.bad{background:red!important; color: white !important;}
.locked{color: #777; font-style: italic;}

Hoty Dogy Audit

<select id="monthSelect" onchange="changeMonth()"></select>

<script>
/* ================= SECURITY & STORAGE ================= */
function hash(str){
  let h=0;
  for(let i=0;i<str.length;i++){
    h = Math.imul(31,h)+str.charCodeAt(i)|0;
  }
  return h.toString();
}

function getRole(){
  try{
    const raw=localStorage.getItem("auth");
    if(!raw)return "admin"; // Test uchun admin qilib qo'ydim, productionda null bo'lishi kerak
    const data=JSON.parse(atob(raw));
    return data.role;
  }catch{return "admin";} 
}

const role=getRole();

function saveData(data){
  const payload=JSON.stringify(data);
  const signature=hash(payload+"HotySecretKey");
  localStorage.setItem("auditSecure", btoa(JSON.stringify({payload,signature})));
}

function getData(){
  const raw=localStorage.getItem("auditSecure");
  if(!raw)return {};
  try{
    const obj=JSON.parse(atob(raw));
    if(hash(obj.payload+"HotySecretKey")!==obj.signature){
      alert("Ma'lumot buzilgan!");
      return {};
    }
    return JSON.parse(obj.payload);
  }catch{return {};}
}

/* ================= BASIC DATA ================= */
const branches = ["Ц1","Шevchenko","Chilonzor","Next","Eko","IT Park"];
const questions = [

/* ================= MONTH LOGIC ================= */
let currentMonth = new Date().getFullYear() + "-" + (new Date().getMonth() + 1);

function loadMonths(){
  let data = getData();
  if(!data[currentMonth]) {
      data[currentMonth] = {};
      saveData(data);
  }
  let select = document.getElementById("monthSelect");
  select.innerHTML = "";
  Object.keys(data).sort().reverse().forEach(m => {
    select.innerHTML += `<option value="${m}">${m}</option>`;
  });
  select.value = currentMonth;
}

function changeMonth(){
  currentMonth = document.getElementById("monthSelect").value;
  back(); // Menuga qaytish
}

/* ================= AUDIT ENGINE ================= */
let currentBranch = "";
let currentIndex = 0;
let tempMarks = {};
let tempImages = {};

function openAudit(){
  document.getElementById("menu").style.display="none";
  let html=`<div class="back" onclick="back()">Orqaga</div>`;
  branches.forEach(b=>{
    html+=`
    <div class="card">
      <b>${b}</b><br>
      <button onclick="openAuditForm('${b}',0)">Audit 1</button>
      <button onclick="openAuditForm('${b}',1)">Audit 2</button>
    </div>`;
  });
  document.getElementById("content").innerHTML=html;
}

function openAuditForm(branch, index){
  currentBranch = branch;
  currentIndex = index;
  tempMarks = {}; // Tozalash
  tempImages = {};

  let data = getData();
  let existing = data[currentMonth]?.[branch]?.audits?.[index];

  let html=`<div class="back" onclick="openAudit()">Orqaga</div>`;
  html+=`<div class="card"><b>${branch} - Audit ${index+1}</b></div>`;

  questions.forEach((q, i)=>{
    let savedMark = existing?.marks?.[i];
    let savedImage = existing?.images?.[i];

    html+=`<div class="card">
      <p><b>${i+1}.</b> ${q.text}</p>`;

    if(existing){
        if(savedMark){
          html+=`<div class="${savedMark==="good"?"scoreGreen":"scoreRed"}">
            ${savedMark==="good"?"✔ Yaxshi":"❌ Yomon (-"+q.minus+")"}
          </div>`;
        }
        if(savedImage){
          html+=`<img src="${savedImage}" onclick="openImage('${savedImage}')">`;
        }
    } else {
        if(role !== "viewer"){
          html+=`
          <div style="margin-top:10px">
            <button onclick="mark(${i},'good')" id="g${i}">✔</button>
            <button onclick="mark(${i},'bad')" id="b${i}">✖</button>
            <input type="file" accept="image/*" onchange="uploadImage(event,${i})">
          </div>`;
        } else {
          html+=`<div class="locked">Audit hali o'tkazilmagan</div>`;
        }
    }
    html+=`</div>`;
  });

  if(!existing && role !== "viewer"){
    html+=`<button onclick="finishAudit()" style="width:100%; padding:20px; font-size:18px; background: green; color:white; margin-bottom:50px;">Auditni Yakunlash</button>`;
  }
  document.getElementById("content").innerHTML = html;
  window.scrollTo(0,0);
}

function mark(i, type){
  tempMarks[i] = type;
  document.getElementById("g"+i).classList.toggle("good", type === "good");
  document.getElementById("b"+i).classList.toggle("bad", type === "bad");
}

function uploadImage(event, index){
  let file = event.target.files[0];
  if(!file) return;
  
  // Rasmni kichraytirish (localStorage to'lib qolmasligi uchun)
  let reader = new FileReader();
  reader.onload = function(e){
    let img = new Image();
    img.onload = function() {
        let canvas = document.createElement("canvas");
        let ctx = canvas.getContext("2d");
        let maxW = 600; 
        let scale = maxW / img.width;
        canvas.width = maxW;
        canvas.height = img.height * scale;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        tempImages[index] = canvas.toDataURL("image/jpeg", 0.7); // 70% sifat
    }
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function finishAudit(){
  // Kamida barcha savollar belgilanganini tekshirish tavsiya etiladi
  if(Object.keys(tempMarks).length < questions.length) {
      if(!confirm("Barcha savollar belgilanmadi. Baribir saqlaysizmi?")) return;
  }

  let score = 100;
  questions.forEach((q, i) => {
    if(tempMarks[i] === "bad") score -= q.minus;
  });
  if(score < 0) score = 0;

  let data = getData();
  if(!data[currentMonth]) data[currentMonth] = {};
  if(!data[currentMonth][currentBranch]) data[currentMonth][currentBranch] = {audits:[null,null]};
  
  // Tarixni saqlash: Marks va Images obyektlarini klonlash
  data[currentMonth][currentBranch].audits[currentIndex] = {
    score: score,
    marks: Object.assign({}, tempMarks),
    images: Object.assign({}, tempImages),
    date: new Date().toLocaleString()
  };

  saveData(data);
  alert("Audit muvaffaqiyatli saqlandi! Ball: " + score);
  openAudit();
}

/* ================= REPORTS ================= */
function openAuditBall(){
  document.getElementById("menu").style.display="none";
  let data = getData();
  let html=`<div class="back" onclick="back()">Orqaga</div>`;
  branches.forEach(b=>{
    let audits = data[currentMonth]?.[b]?.audits || [null, null];
    let s1 = audits[0] ? audits[0].score : "-";
    let s2 = audits[1] ? audits[1].score : "-";
    let avg = (audits[0] && audits[1]) ? Math.round((audits[0].score + audits[1].score)/2) : (audits[0]?.score || audits[1]?.score || 0);

    html+=`<div class="card">
      <div style="font-size:20px; border-bottom:1px solid #eee; margin-bottom:10px; padding-bottom:5px;"><b>${b}</b></div>
      <div style="display:flex; justify-content:space-between">
        <span>Audit 1: <b>${s1}</b></span>
        <span>Audit 2: <b>${s2}</b></span>
      </div>
      <div style="margin-top:10px; font-size:18px; color:#000">O'rtacha ball: <b>${avg}</b></div>
    </div>`;
  });
  document.getElementById("content").innerHTML=html;
}

/* ================= UTILS ================= */
function openImage(src){
  let w=window.open("");
  w.document.write(`<body style="margin:0; background:#000; display:flex; align-items:center; justify-content:center;"><img src="${src}" style="max-width:100%; max-height:100%;"></body>`);
}

function loadMenu(){
  let m=document.getElementById("menu");
  m.innerHTML=`
    <div class="btn" onclick="openAudit()">🔍 Audit O'tkazish</div>
    <div class="btn" onclick="openAuditBall()">📊 Natijalar (Ball)</div>
  `;
}

function back(){
  document.getElementById("content").innerHTML="";
  document.getElementById("menu").style.display="grid";
}

function logout(){
  localStorage.removeItem("auth");
  location.reload();
}

// Start
loadMonths();
loadMenu();
</script>
