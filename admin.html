<!DOCTYPE html>
<html lang="uz">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-4xl mx-auto">
        <h2 class="text-2xl font-bold mb-6">Admin Panel - Boshqaruv</h2>

        <!-- Yangi Filial Qo'shish -->
        <div class="bg-white p-6 rounded-xl shadow-sm mb-6">
            <h3 class="font-bold mb-4">Yangi Filial Qo'shish</h3>
            <div class="flex gap-4">
                <input type="text" id="newFilial" placeholder="Filial nomi" class="flex-1 p-2 border rounded">
                <button onclick="alert('Filial qo\'shildi!')" class="bg-blue-600 text-white px-6 py-2 rounded shadow">Qo'shish</button>
            </div>
        </div>

        <!-- Kategoriyalarni Boshqarish -->
        <div class="bg-white p-6 rounded-xl shadow-sm">
            <h3 class="font-bold mb-4">Audit Kategoriyalari</h3>
            <ul class="space-y-3">
                <li class="flex justify-between items-center p-2 bg-gray-100 rounded">
                    <span>Kamera nazorati</span>
                    <button class="text-red-500">O'chirish</button>
                </li>
                <li class="flex justify-between items-center p-2 bg-gray-100 rounded">
                    <span>SB Ball (Xavfsizlik)</span>
                    <button class="text-red-500">O'chirish</button>
                </li>
            </ul>
            <div class="mt-4 flex gap-4">
                <input type="text" id="cat" placeholder="Yangi kategoriya..." class="flex-1 p-2 border rounded">
                <button onclick="alert('Kategoriya qo\'shildi!')" class="bg-green-600 text-white px-6 py-2 rounded shadow">Qo'shish</button>
            </div>
        </div>
    </div>
</body>
</html>
