<!-- Admin Panel qismi -->
<section class="bg-white p-6 rounded-xl shadow-lg border border-gray-200">
    <h3 class="text-xl font-bold mb-4 text-blue-800">Filial natijalarini kiritish</h3>
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
        <select id="filialSelect" class="p-2 border rounded-lg bg-gray-50">
            <option value="Filial 1">Filial 1</option>
            <option value="Filial 2">Filial 2</option>
            <option value="Filial 3">Filial 3</option>
            <option value="Filial 4">Filial 4</option>
            <option value="Filial 5">Filial 5</option>
            <option value="Filial 6">Filial 6</option>
        </select>
        <input type="number" id="audit1" placeholder="Audit 1 ball" class="p-2 border rounded-lg">
        <input type="number" id="audit2" placeholder="Audit 2 ball" class="p-2 border rounded-lg">
        <input type="number" id="sbBall" placeholder="SB Ball" class="p-2 border rounded-lg">
        <button onclick="saveData()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">Saqlash</button>
    </div>
</section>

<script>
function saveData() {
    const filial = document.getElementById('filialSelect').value;
    const a1 = parseFloat(document.getElementById('audit1').value) || 0;
    const a2 = parseFloat(document.getElementById('audit2').value) || 0;
    const sb = parseFloat(document.getElementById('sbBall').value) || 0;
    
    const otdacha = (a1 + a2) / 2;
    
    // Ma'lumotlarni obyekt qilib saqlaymiz
    const data = {
        name: filial,
        audit1: a1,
        audit2: a2,
        sb: sb,
        total: otdacha,
        lastMonth: 85 // Bu o'tgan oydan qolgan shartli ball
    };

    localStorage.setItem(filial, JSON.stringify(data));
    alert(filial + " ma'lumotlari saqlandi!");
}
</script>
